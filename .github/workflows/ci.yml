# Xiaoyi SDK CI配置
# 包含：多版本Python测试、代码格式检查、类型检查、测试覆盖率

name: Xiaoyi SDK CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  workflow_dispatch:  # 手动触发

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # 代码格式检查
  lint:
    name: 代码格式检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: 运行Black检查
        run: black --check --diff src/ tests/

      - name: 运行isort检查
        run: isort --check-only --diff src/ tests/

      - name: 运行flake8检查
        run: flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203,W503

  # 类型检查
  type-check:
    name: 类型检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install mypy requests
          pip install -e .

      - name: 运行mypy检查
        run: mypy src/xiaoyi_sdk --strict --ignore-missing-imports

  # 多版本测试
  test:
    name: 测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov requests
          pip install -e .

      - name: 运行测试
        run: pytest tests/ -v --tb=short --cov=src/xiaoyi_sdk --cov-report=xml --cov-report=term-missing

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # 测试覆盖率检查
  coverage:
    name: 测试覆盖率检查
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载覆盖率报告
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装coverage
        run: pip install coverage

      - name: 检查覆盖率阈值
        run: |
          coverage report --fail-under=80
          echo "当前测试覆盖率已达标"

  # 代码安全检查
  security:
    name: 代码安全检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装安全检查工具
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: 运行bandit安全检查
        run: bandit -r src/xiaoyi_sdk -ll --skip B101

      - name: 检查依赖安全
        run: safety check --full-report
        continue-on-error: true  # 允许失败，仅作为警告

  # 构建检查
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 构建包
        run: python -m build

      - name: 检查包格式
        run: twine check dist/*

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 7

  # 所有检查通过的汇总
  ci-success:
    name: CI检查完成
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, security, build]
    if: success()
    steps:
      - name: 输出成功信息
        run: |
          echo "✅ 所有CI检查通过！"
          echo "- 代码格式检查通过"
          echo "- 类型检查通过"
          echo "- 单元测试通过 (Python 3.8-3.12)"
          echo "- 安全检查通过"
          echo "- 构建检查通过"